apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- namespace.yml

namespace: collector-staging

images:
- name: collector-catalog-service
  newName: ghcr.io/acestv/collector/collector-catalog-service
  newTag: 8251051212686c8531d21d28b30dcc301b5af183
- name: collector-chat-service
  newName: ghcr.io/acestv/collector/collector-chat-service
  newTag: 8251051212686c8531d21d28b30dcc301b5af183
- name: collector-fraud-service
  newName: ghcr.io/acestv/collector/collector-fraud-service
  newTag: 8251051212686c8531d21d28b30dcc301b5af183
- name: collector-frontend
  newName: ghcr.io/acestv/collector/collector-frontend
  newTag: 8251051212686c8531d21d28b30dcc301b5af183
- name: collector-gateway
  newName: ghcr.io/acestv/collector/collector-gateway
  newTag: 8251051212686c8531d21d28b30dcc301b5af183
- name: collector-keycloak
  newName: ghcr.io/acestv/collector/collector-keycloak
  newTag: staging
- name: collector-notification-service
  newName: ghcr.io/acestv/collector/collector-notification-service
  newTag: 8251051212686c8531d21d28b30dcc301b5af183
- name: collector-order-service
  newName: ghcr.io/acestv/collector/collector-order-service
  newTag: 8251051212686c8531d21d28b30dcc301b5af183
- name: collector-payment-service
  newName: ghcr.io/acestv/collector/collector-payment-service
  newTag: 8251051212686c8531d21d28b30dcc301b5af183
- name: collector-user-service
  newName: ghcr.io/acestv/collector/collector-user-service
  newTag: 8251051212686c8531d21d28b30dcc301b5af183

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: staging.collector.local
  target:
    kind: Ingress
    name: collector-ingress
