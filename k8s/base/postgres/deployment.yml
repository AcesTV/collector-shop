apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
data:
  POSTGRES_USER: collector
  POSTGRES_DB: collector
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  init-db.sql: |
    -- ============================================
    -- CollectorShop - Database Initialization
    -- Creates separate schemas for each microservice
    -- ============================================

    -- Create the Keycloak database
    SELECT 'CREATE DATABASE keycloak'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'keycloak')\gexec

    -- Create schemas for each microservice
    CREATE SCHEMA IF NOT EXISTS user_service;
    CREATE SCHEMA IF NOT EXISTS catalog_service;
    CREATE SCHEMA IF NOT EXISTS order_service;
    CREATE SCHEMA IF NOT EXISTS payment_service;
    CREATE SCHEMA IF NOT EXISTS notification_service;
    CREATE SCHEMA IF NOT EXISTS chat_service;
    CREATE SCHEMA IF NOT EXISTS fraud_service;

    -- Grant permissions
    GRANT ALL PRIVILEGES ON SCHEMA user_service TO collector;
    GRANT ALL PRIVILEGES ON SCHEMA catalog_service TO collector;
    GRANT ALL PRIVILEGES ON SCHEMA order_service TO collector;
    GRANT ALL PRIVILEGES ON SCHEMA payment_service TO collector;
    GRANT ALL PRIVILEGES ON SCHEMA notification_service TO collector;
    GRANT ALL PRIVILEGES ON SCHEMA chat_service TO collector;
    GRANT ALL PRIVILEGES ON SCHEMA fraud_service TO collector;

    -- Log initialization
    DO $$
    BEGIN
        RAISE NOTICE '✅ CollectorShop database initialized with all schemas.';
    END $$;
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  POSTGRES_PASSWORD: collector_secret_2025
  DB_PASSWORD: collector_secret_2025
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              memory: 512Mi
              ephemeral-storage: 1Gi
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: db-credentials
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "collector", "-d", "collector"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "collector", "-d", "collector"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init-script
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
