apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collector-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AcesTV/collector-shop.git
    targetRevision: develop
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: collector-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
