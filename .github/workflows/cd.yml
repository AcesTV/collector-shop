name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main, develop, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/collector

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy to Kubernetes
        run: |
          BRANCH=${{ github.event.workflow_run.head_branch }}
          
          if [[ "$BRANCH" == "main" ]]; then
            OVERLAY="prod"
          elif [[ "$BRANCH" == "staging" ]]; then
            OVERLAY="staging"
          else
            OVERLAY="dev"
          fi
          
          echo "🚀 Deploying to $OVERLAY environment (branch: $BRANCH)"
          
          # Apply Kustomize overlay
          kubectl apply -k k8s/overlays/$OVERLAY
          
          # Wait for critical services
          kubectl rollout status deployment/postgres -n collector-$OVERLAY --timeout=120s
          kubectl rollout status deployment/keycloak -n collector-$OVERLAY --timeout=180s

          echo "✅ Deployment to $OVERLAY complete!"
