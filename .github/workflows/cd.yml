name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main, develop, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/collector

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Update image tags and Commit to Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${{ github.event.workflow_run.head_branch }}
          SHA=${{ github.event.workflow_run.head_sha }}
          
          if [[ "$BRANCH" == "main" ]]; then
            OVERLAY="prod"
          elif [[ "$BRANCH" == "staging" ]]; then
            OVERLAY="staging"
          else
            OVERLAY="dev"
          fi
          
          echo "🚀 Updating SHA to $SHA for $OVERLAY"
          
          # Setup Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force checkout the branch that triggered the workflow
          git fetch origin $BRANCH
          git checkout $BRANCH
          
          # Update images using Kustomize
          cd k8s/overlays/$OVERLAY
          kustomize edit set image collector-user-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-user-service:$SHA
          kustomize edit set image collector-catalog-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-catalog-service:$SHA
          kustomize edit set image collector-order-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-order-service:$SHA
          kustomize edit set image collector-payment-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-payment-service:$SHA
          kustomize edit set image collector-notification-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-notification-service:$SHA
          kustomize edit set image collector-chat-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-chat-service:$SHA
          kustomize edit set image collector-fraud-service=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-fraud-service:$SHA
          kustomize edit set image collector-frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-frontend:$SHA
          kustomize edit set image collector-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/collector-gateway:$SHA
          
          # Commit and Push
          git add kustomization.yaml
          git commit -m "chore(gitops): update images for $OVERLAY to $SHA [skip ci]" || echo "No changes to commit"
          git push origin $BRANCH

      - name: Notify ArgoCD (Optional)
        run: echo "ArgoCD will automatically sync the changes from Git."
