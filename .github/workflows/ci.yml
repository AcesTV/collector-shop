name: CI Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/collector
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===== Lint & Test all services =====
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/user-service
          - services/catalog-service
          - services/order-service
          - services/payment-service
          - services/notification-service
          - services/chat-service
          - services/fraud-service
          - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ${{ matrix.service }}

      - name: Lint
        run: npm run lint --if-present
        working-directory: ${{ matrix.service }}

      - name: Test
        run: npm test --if-present
        working-directory: ${{ matrix.service }}

  # ===== E2E Tests (Playwright) =====
  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests
        run: npx playwright test
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ===== Security Audit =====
  security:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service:
          - services/user-service
          - services/catalog-service
          - services/order-service
          - services/payment-service
          - services/notification-service
          - services/chat-service
          - services/fraud-service
          - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ${{ matrix.service }}

      - name: Security audit
        run: npm audit --audit-level=high || true
        working-directory: ${{ matrix.service }}

  # ===== SonarQube Analysis =====
  sonarqube:
    runs-on: ubuntu-latest
    needs: lint-and-test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate blame info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install catalog-service dependencies
        run: npm install
        working-directory: services/catalog-service

      - name: Generate test coverage
        run: npx jest --coverage --coverageReporters=lcov
        working-directory: services/catalog-service

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ===== Load Tests (k6 smoke) =====
  load-tests:
    runs-on: ubuntu-latest
    needs: lint-and-test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/latest/download/k6-latest-linux-amd64.tar.gz | tar xz
          sudo mv k6-*/k6 /usr/local/bin/
          k6 version

      - name: Run smoke tests - Health checks
        if: ${{ !cancelled() }}
        run: k6 run --env LOAD_PROFILE=smoke --env BASE_URL=http://localhost scenarios/health-checks.js
        working-directory: load-tests
        continue-on-error: true

      - name: Run smoke tests - Catalog browsing
        if: ${{ !cancelled() }}
        run: k6 run --env LOAD_PROFILE=smoke --env BASE_URL=http://localhost scenarios/catalog-browsing.js
        working-directory: load-tests
        continue-on-error: true

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: k6-load-test-results
          path: load-tests/results/
          retention-days: 14
          if-no-files-found: ignore

  # ===== Build Docker Images =====
  build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, security, e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging')

    strategy:
      matrix:
        include:
          - service: gateway
            image: collector-gateway
          - service: frontend
            image: collector-frontend
          - service: services/user-service
            image: collector-user-service
          - service: services/catalog-service
            image: collector-catalog-service
          - service: services/order-service
            image: collector-order-service
          - service: services/payment-service
            image: collector-payment-service
          - service: services/notification-service
            image: collector-notification-service
          - service: services/chat-service
            image: collector-chat-service
          - service: services/fraud-service
            image: collector-fraud-service
          - service: keycloak
            image: collector-keycloak

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lower case owner name
        run: |
          echo "IMAGE_PREFIX=${GITHUB_REPOSITORY_OWNER,,}/collector" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
